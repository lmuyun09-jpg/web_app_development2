{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex align-items-center mb-4">
            <a href="{{ url_for('recipe.detail', id=recipe.id) }}" class="btn btn-light rounded-circle me-3 shadow-sm"><i class="bi bi-arrow-left"></i></a>
            <h2 class="fw-bold mb-0">編輯食譜</h2>
        </div>

        <div class="card glass-card border-0 shadow-lg">
            <div class="card-body p-4 p-md-5">
                <form action="{{ url_for('recipe.update', id=recipe.id) }}" method="POST">
                    <div class="mb-4">
                        <label for="name" class="form-label fw-bold">食譜名稱 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-lg bg-light border-0 shadow-none" id="name" name="name" required value="{{ form_data.name if form_data else recipe.name }}">
                    </div>

                    <div class="mb-4">
                        <label for="description" class="form-label fw-bold">簡介描述</label>
                        <textarea class="form-control bg-light border-0 shadow-none" id="description" name="description" rows="4">{{ form_data.description if form_data else recipe.description }}</textarea>
                    </div>

                    <div class="row g-4 mb-4">
                        <div class="col-md-4">
                            <label for="category" class="form-label fw-bold">分類</label>
                            <select class="form-select bg-light border-0 shadow-none" id="category" name="category">
                                {% for cat in categories %}
                                    <option value="{{ cat }}" {% if (form_data and form_data.category == cat) or (not form_data and recipe.category == cat) %}selected{% endif %}>{{ cat }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="cooking_time" class="form-label fw-bold">烹飪時間 (分鐘)</label>
                            <input type="number" class="form-control bg-light border-0 shadow-none" id="cooking_time" name="cooking_time" min="1" value="{{ form_data.cooking_time if form_data else recipe.cooking_time }}">
                        </div>
                        <div class="col-md-4">
                            <label for="servings" class="form-label fw-bold">份量 (人份)</label>
                            <input type="number" class="form-control bg-light border-0 shadow-none" id="servings" name="servings" min="1" value="{{ form_data.servings if form_data else recipe.servings }}">
                        </div>
                    </div>

                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-primary-custom btn-lg shadow">儲存變更</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
